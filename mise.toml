[tools]
node = "22"
pnpm = "9"

[env]
# Ensure mise-managed node is used
PATH = "{{ config_root }}/node_modules/.bin:{{ env.PATH }}"
# Load project env vars (DATABASE_URL, S3/AWS, API_PORT, JWT_SECRET) into every
# task and `mise exec`. Sourced from the root .env so db:migrate (drizzle-kit)
# and dev:backend (Fastify getEnv) both see them without each task
# re-importing dotenv. Skips missing file gracefully (e.g. on a fresh clone
# before `cp .env.example .env`).
_.file = "{{ config_root }}/.env"

[tasks.install]
description = "Install all dependencies"
run = "pnpm install"

[tasks.dev]
description = "Start all services (db, backend, mobile)"
depends = ["db:up"]
run = "pnpm dev"

[tasks."dev:backend"]
description = "Start the backend dev server"
run = "pnpm --filter @interview-recorder/backend dev"

[tasks."dev:mobile"]
description = "Start the Expo mobile app"
run = "pnpm --filter @interview-recorder/mobile start"

[tasks.build]
description = "Build all packages"
run = "pnpm build"

[tasks."build:backend"]
description = "Build the backend"
run = "pnpm --filter @interview-recorder/backend build"

[tasks.test]
description = "Run all tests"
run = "pnpm test"

[tasks."test:backend"]
description = "Run backend tests"
run = "pnpm --filter @interview-recorder/backend test"

[tasks.lint]
description = "Run Biome linter on all packages"
run = "pnpm lint"

[tasks.format]
description = "Format all files with Biome"
run = "pnpm format"

[tasks."format:check"]
description = "Check formatting without writing"
run = "pnpm format:check"

[tasks.typecheck]
description = "Type-check all packages (tsc)"
run = "pnpm typecheck"

[tasks."typecheck:backend"]
description = "Type-check the backend only"
run = "pnpm --filter @interview-recorder/backend typecheck"

[tasks.check]
description = "Run all checks (lint + format:check + typecheck + test)"
depends = ["lint", "format:check", "typecheck", "test"]

[tasks."db:up"]
description = "Start PostgreSQL and LocalStack"
run = "docker compose up -d"

[tasks."db:down"]
description = "Stop PostgreSQL and LocalStack"
run = "docker compose down"

[tasks."db:migrate"]
description = "Run database migrations"
run = "pnpm --filter @interview-recorder/backend db:migrate"

[tasks."db:studio"]
description = "Open Drizzle Studio (DB browser)"
run = "pnpm --filter @interview-recorder/backend db:studio"
[tasks.clean]
description = "Remove build artifacts and node_modules"
run = [
  "pnpm -r exec rm -rf dist build .turbo .expo",
  "rm -rf node_modules",
]

# --- Tinyauth (HTTP credential store) ---
# Start Tinyauth over HTTP (no Caddy/HTTPS/hosts edits). The backend validates
# interviewer credentials against it; three dummy accounts are seeded via
# TINYAUTH_AUTH_USERS. See docs/auth.md.
[tasks."auth:up"]
description = "Start Tinyauth (HTTP credential store)"
run = "docker compose up -d tinyauth"

[tasks."auth:down"]
description = "Stop Tinyauth"
run = "docker compose down tinyauth"

# --- Full development stack ---
[tasks."stack:up"]
description = "Start the full dev stack (PostgreSQL, LocalStack, Tinyauth)"
depends = ["db:up", "auth:up"]
run = "echo 'Stack is up. Run `mise run dev:backend` and `mise run dev:mobile` in separate terminals.'"

[tasks."stack:down"]
description = "Stop the entire dev stack"
run = "docker compose down"

# --- Maestro E2E tests ---
# Requires the full stack + the app installed on a simulator.
#   mise run stack:up && mise run dev:backend && mise run maestro:test
[tasks."maestro:test"]
description = "Run all Maestro E2E flows (.maestro/*.yaml)"
run = "maestro test .maestro/"

[tasks."maestro:smoke"]
description = "Run the smoke Maestro flow (no backend needed)"
run = "maestro test .maestro/smoke.yaml"

[tasks."maestro:auth"]
description = "Run the auth Maestro flow (needs backend + tinyauth)"
run = "maestro test .maestro/auth.yaml"

[tasks."maestro:create-recording"]
description = "Run the create-recording Maestro flow (needs full stack)"
run = "maestro test .maestro/create-recording.yaml"

# Run the E2E test workflow on EAS (builds + tests in the cloud).
[tasks."e2e:android"]
description = "Run Maestro E2E tests on EAS (Android)"
run = "npx eas-cli@latest workflow:run .eas/workflows/e2e-test-android.yml"

# --- Deepsec (AI-powered vulnerability scanner) ---
[tasks.deepsec]
description = "Run deepsec commands (AI vulnerability scanner) with deepseek-v4-flash"
dir = "{{ config_root }}/.deepsec"
run = "pnpm deepsec --model deepseek-v4-flash"

[tasks."deepsec:scan"]
description = "Scan for candidate vulnerability sites"
dir = "{{ config_root }}/.deepsec"
run = "pnpm deepsec scan"

[tasks."deepsec:process"]
description = "Investigate candidates with AI agent using deepseek-v4-flash"
dir = "{{ config_root }}/.deepsec"
run = "pnpm deepsec process --agent pi --model deepseek-v4-flash"

[tasks."deepsec:report"]
description = "Generate markdown + JSON report from current analysis"
dir = "{{ config_root }}/.deepsec"
run = "pnpm deepsec report"

[tasks."deepsec:status"]
description = "Show current state of the project mirror"
dir = "{{ config_root }}/.deepsec"
run = "pnpm deepsec status"
